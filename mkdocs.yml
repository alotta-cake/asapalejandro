site_name: Alejandro Palumbo
site_description: Personal Brand & Professional Portfolio
site_author: Alejandro Palumbo
site_url: https://asapalejandro.com

# Repository
repo_name: alotta-cake/asapalejandro
repo_url: https://github.com/alotta-cake/Asapalejandro.git
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.delay
    - navigation.instant.loading
    - navigation.instant.prefetch
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@IBMAlejandro
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/alejandro-palumbo/
    - icon: fontawesome/brands/tiktok
      link: https://tiktok.com/@asapalejandro
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/asapalejandro
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/925alejandro

# Plugins
plugins:
  - search
  - social
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

# Extra CSS and JS
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Navigation
nav:
  - Home: index.md
  - About: about.md
  - Content:
    - Blog: blog/index.md
    - Podcasts: podcasts/index.md
    - Videos: videos/index.md
  - Events:
    - Upcoming: events/upcoming.md
    - Past Events: events/past.md
    - IBM Events: events/ibm.md
  - Resources:
    - Speaking: resources/speaking.md
    - Media Kit: resources/media-kit.md
    - Contact: resources/contact.md

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Extra
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@alejandropalumbo
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/alejandropalumbo
    - icon: fontawesome/brands/tiktok
      link: https://tiktok.com/@alejandropalumbo
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/alejandropalumbo
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/alejandropalumbo 